<main class="min-h-screen bg-surface flex items-center justify-center p-4 font-body">
  <div class="max-w-[1000px] w-full bg-surface-container-lowest rounded-[28px] shadow-xl overflow-hidden flex flex-col md:flex-row min-h-[600px]">
    
    <div class="md:w-1/2 bg-secondary p-12 text-white flex flex-col justify-between relative overflow-hidden">
      <div class="relative z-10">
        <h1 class="text-4xl font-manrope font-extrabold mb-4 leading-tight uppercase tracking-tight">
          Emergencia <br> Vehicular
        </h1>
        <p class="text-secondary-container text-lg opacity-90 leading-relaxed">
          Gestión inteligente para talleres mecánicos de alto rendimiento.
        </p>
      </div>

      <div class="relative z-10">
        <div class="flex items-center gap-4 p-4 bg-white/10 rounded-2xl backdrop-blur-sm">
          <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center shrink-0">
            <span class="material-symbols-outlined">verified_user</span>
          </div>
          <div>
            <p class="font-bold">Acceso Seguro</p>
            <p class="text-sm opacity-80">Sesión protegida mediante JWT.</p>
          </div>
        </div>
      </div>
      
      <div class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -mr-32 -mt-32 blur-3xl"></div>
      <div class="absolute bottom-0 left-0 w-48 h-48 bg-primary/20 rounded-full -ml-24 -mb-24 blur-3xl"></div>
    </div>

    <div class="md:w-1/2 p-8 md:p-12 flex flex-col justify-center bg-white">
      <div class="mb-10">
        <h2 class="text-3xl font-manrope font-bold text-on-surface mb-2 text-center md:text-left">Acceso Taller</h2>
        <p class="text-on-surface-variant text-center md:text-left italic">Introduce tus credenciales de administrador</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <div class="group">
          <label class="text-sm font-bold text-on-surface-variant ml-1 mb-2 block group-focus-within:text-primary transition-colors">
            Correo Electrónico
          </label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">
              mail
            </span>
            <input
              type="email"
              formControlName="email"
              placeholder="admin@taller.com"
              class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-primary/10 focus:bg-white focus:border-primary outline-none transition-all"
            />
          </div>
          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-xs text-error mt-2 ml-2 flex items-center gap-1">
            <span class="material-symbols-outlined text-sm">error</span>
            Correo inválido o requerido.
          </div>
        </div>

        <div class="group">
          <label class="text-sm font-bold text-on-surface-variant ml-1 mb-2 block group-focus-within:text-primary transition-colors">
            Contraseña
          </label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">
              lock
            </span>
            <input
              type="password"
              formControlName="password"
              placeholder="••••••••"
              class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-primary/10 focus:bg-white focus:border-primary outline-none transition-all"
            />
          </div>
        </div>

        <button
          type="submit"
          [disabled]="loginForm.invalid"
          class="w-full bg-primary text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/25 hover:bg-primary/90 hover:shadow-xl hover:-translate-y-1 transition-all active:scale-95 flex items-center justify-center gap-3 mt-6 disabled:opacity-40 disabled:hover:translate-y-0 disabled:cursor-not-allowed"
        >
          <span>Ingresar al Sistema</span>
          <span class="material-symbols-outlined">login</span>
        </button>
      </form>

      <div class="mt-10 pt-6 border-t border-gray-100">
        <p class="text-center text-sm text-on-surface-variant">
          ¿Nuevo taller?
          <a routerLink="/register" class="text-primary font-bold hover:underline decoration-2 underline-offset-4">
            Crea una cuenta aquí
          </a>
        </p>
      </div>
    </div>
  </div>
</main>
